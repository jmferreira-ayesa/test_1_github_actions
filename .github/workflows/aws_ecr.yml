name: Deploy Image in ECR

on:
  workflow_dispatch:

permissions:
  id-token: write   # 🔴 obligatorio para OIDC
  contents: read

jobs:
  test-aws-login:
    runs-on: ubuntu-latest

    steps:

      - name: Debug OIDC token claims
        run: |
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | \
            jq -r '.value' | cut -d. -f2 | base64 -d 2>/dev/null | jq .
            
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Verify identity (STS get caller identity)
        run: aws sts get-caller-identity

      - name: Print confirmation
        run: echo "OIDC login successful 🎉"
