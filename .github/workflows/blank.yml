# This is a basic workflow to help you get started with Actions

name: Build y despliegue del backend

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # ---------------------------------------------------------------------
  # Job 1: compilar y testear con Maven. Separado del job de despliegue
  # para que un fallo de tests pare el pipeline ANTES de gastar tiempo
  # construyendo y publicando una imagen Docker que no íbamos a desplegar.
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
 
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # cache: maven gestiona automáticamente el caché de ~/.m2/repository
          # entre ejecuciones, usando el hash de pom.xml como clave. Ahorra
          # 1-2 minutos por ejecución sin que tengas que configurar nada más.
          cache: maven
 
      - name: Ejecutar tests (unitarios + integración)
        run: mvn -B verify
